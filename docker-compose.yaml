version: '3.8'

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    # Primero instala, luego compila (genera la carpeta dist) y finalmente arranca
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3000:3000"
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=https://db.gestionrpjccm.com
      - BACKEND_URL=https://api.gestionrpjccm.com
    restart: unless-stopped
